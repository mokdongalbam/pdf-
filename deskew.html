<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Deskew PDF Online</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; max-width: 600px; margin: auto; }
        .upload-box { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 10px; }
        button { margin-top: 15px; padding: 10px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #475569; }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-weight: bold; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Home</a>
    <h2>Auto Deskew PDF</h2>
    <div class="upload-box">
        <input type="file" id="pdfInput" accept="application/pdf" />
        <br/>
        <button id="processBtn">Upload & Process</button>
        <div class="loader" id="loader"></div>
        <div id="status">Please select a PDF file. (Multiple pages supported)</div>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("Please select a PDF file first.");
                return;
            }

            const statusEl = document.getElementById('status');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('processBtn');

            btn.disabled = true;
            loader.style.display = 'block';
            statusEl.innerText = "Processing on server... (It may take about 1 minute on first run due to cold start.)";
            statusEl.style.color = "#475569";

            const formData = new FormData();
            formData.append("file", file);

            try {
                // 회원님의 Render 주소
                const apiUrl = 'https://pdf-backend-oylp.onrender.com/api/deskew'; 

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Server processing failed");

                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `deskewed_${file.name}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

                statusEl.innerText = "Success! Your file has been downloaded.";
                statusEl.style.color = "#16a34a"; 
            } catch (error) {
                console.error(error);
                statusEl.innerText = "An error occurred. The server might be waking up, please try again in 1 minute.";
                statusEl.style.color = "#dc2626"; 
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
