<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 자동 수평 맞춤</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 30px; max-width: 600px; margin: auto; }
        .upload-box { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 10px; }
        button { margin-top: 15px; padding: 10px 20px; font-size: 16px; background: #2563eb; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        #status { margin-top: 15px; font-weight: bold; color: #475569; }
        .loader { display: none; margin: 10px auto; border: 4px solid #f3f3f3; border-top: 4px solid #2563eb; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h2>PDF 자동 수평 맞춤 (NAPS2 스타일)</h2>
    <div class="upload-box">
        <input type="file" id="pdfInput" accept="application/pdf" />
        <br/>
        <button id="processBtn">업로드 및 변환 시작</button>
        <div class="loader" id="loader"></div>
        <div id="status">PDF 파일을 선택해주세요. (여러 장도 가능합니다)</div>
    </div>

    <script>
        document.getElementById('processBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('pdfInput');
            const file = fileInput.files[0];
            
            if (!file) {
                alert("PDF 파일을 먼저 선택해주세요.");
                return;
            }

            const statusEl = document.getElementById('status');
            const loader = document.getElementById('loader');
            const btn = document.getElementById('processBtn');

            btn.disabled = true;
            loader.style.display = 'block';
            statusEl.innerText = "서버에서 변환 중입니다... (무료 서버라 첫 실행 시 1분 정도 걸릴 수 있습니다.)";
            statusEl.style.color = "#475569"; // 기본 색상으로 복구

            const formData = new FormData();
            formData.append("file", file);

            try {
                // 회원님의 Render 서버 주소가 적용된 API URL입니다.
                const apiUrl = 'https://pdf-backend-oylp.onrender.com/api/deskew'; 

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("서버 변환 실패");

                // 결과물 다운로드
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `수평보정됨_${file.name}`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

                statusEl.innerText = "완료되었습니다! 파일이 다운로드 되었습니다.";
                statusEl.style.color = "#16a34a"; // 성공 초록색
            } catch (error) {
                console.error(error);
                statusEl.innerText = "오류가 발생했습니다. 서버가 아직 켜지는 중일 수 있으니 1분 뒤 다시 시도해보세요.";
                statusEl.style.color = "#dc2626"; // 에러 빨간색
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
