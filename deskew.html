        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root { --primary: #38bdf8; --primary-hover: #0284c7; --bg-color: #f8fafc; --text-main: #1e293b; }

        #process-area { display: none; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 30px; }
        .file-info { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; color: var(--primary); }
